name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # 4. Create .env file from GitHub Secrets (🔥 YAHAN FIX HAI 🔥)
      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE }}" > .env

      # 5. Install Dependencies
      - name: Install Dependencies
        run: flutter pub get

      # 6. Build Release APK (Warnings ko bypass karne ke liye flag add kiya hai)
      - name: Build Release APK
        run: flutter build apk --release --android-skip-build-dependency-validation

      # 7. Upload APK Artifact
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecommerce_app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
