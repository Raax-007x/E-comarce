name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Yeh aapko manually GitHub se action run karne ki suvidha dega

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # 1. Aapke code ko repository se fetch karega
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Java setup karega (Android APK build ke liye Java 17 zaroori hai)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # 3. Flutter setup karega (Error fix: Sirf channel 'stable' diya hai)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # 'flutter-version' ko hata diya gaya hai taaki version resolve error na aaye

      # 4. Saare packages aur dependencies install karega
      - name: Install Dependencies
        run: flutter pub get

      # 5. Release APK build karega
      - name: Build Release APK
        run: flutter build apk --release

      # 6. Build hone ke baad APK ko GitHub par upload karega taaki aap download kar sakein
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecommerce_app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
